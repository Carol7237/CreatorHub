# CreatorHub — local development infrastructure (databases only).
# PostgreSQL 16 (monolith + microservices) and MongoDB 7 (notification-service),
# each with a persistent volume. Run a service LOCALLY (profile dev) against these.
# Start with:  docker compose up -d
# Stop with:   docker compose down        (add -v to also drop the data volumes)
#
# NOTE: for the FULL microservices stack in Docker use services/docker-compose.yml
# instead (it ships its own postgres + mongodb on the same host ports — don't run
# both at once).

services:
  postgres:
    image: postgres:16
    container_name: creatorhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: creatorhub
      POSTGRES_PASSWORD: creatorhub
      POSTGRES_DB: creatorhub
    # Host port 5433 -> container 5432. We avoid the host's standard 5432
    # because a native PostgreSQL server may already occupy it on dev machines.
    ports:
      - "5433:5432"
    volumes:
      - creatorhub-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creatorhub -d creatorhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB for the notification-service (NoSQL). Used when running that service
  # locally on the dev profile (mongodb://localhost:27017/notifications_db).
  mongodb:
    image: mongo:7
    container_name: creatorhub-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - creatorhub-mongodata:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  creatorhub-pgdata:
  creatorhub-mongodata:
