# TEST profile — H2 in-memory, no external infrastructure required.
# Activated by @ActiveProfiles("test") on the test classes.
spring:
  datasource:
    # In-memory DB. MODE=PostgreSQL aligns H2's types/SQL with PostgreSQL so the
    # same entity mappings (TEXT, numeric, STRING enums, FKs) work on both.
    # DB_CLOSE_DELAY=-1 keeps the in-memory DB alive for the whole JVM run.
    url: jdbc:h2:mem:creatorhub_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      # Fresh schema created on startup, dropped on shutdown — clean per run.
      ddl-auto: create-drop
    # Keep test output readable.
    show-sql: false
