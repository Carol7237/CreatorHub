spring:
  application:
    name: creatorhub

  datasource:
    # Port 5433 on the host (mapped to the container's 5432) to avoid clashing
    # with a native PostgreSQL that may already run on the standard 5432.
    url: jdbc:postgresql://localhost:5433/creatorhub
    username: creatorhub
    password: creatorhub
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Development convenience: Hibernate keeps the schema in sync with the
      # entities. Will be replaced by a proper migration tool (Flyway/Liquibase)
      # before any production use.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    # Disable Open Session In View: keep transaction boundaries inside the
    # service layer instead of leaking lazy-loading into controllers/views.
    open-in-view: false

server:
  # 8081 instead of the default 8080, which an Oracle TNS listener / APEX may
  # occupy on dev machines.
  port: 8081
