# Base / common configuration — settings that apply to EVERY environment.
# Environment-specific settings (datasource, ddl-auto, ports) live in the
# profile files: application-dev.yml (PostgreSQL/Docker) and
# application-test.yml (H2 in-memory).
#
# Default active profile is "dev", so `./mvnw spring-boot:run` starts against the
# Docker PostgreSQL. Tests override this with @ActiveProfiles("test").
spring:
  application:
    name: creatorhub

  profiles:
    active: dev

  jpa:
    # Keep transaction boundaries inside the service layer (no Open Session In
    # View); valid in all environments.
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
