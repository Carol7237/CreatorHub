# CreatorHub — full microservices stack (Phase 8 Step 4).
# One command brings up the whole backend:  docker compose -f services/docker-compose.yml up --build
#
# Start order is enforced by healthchecks:
#   postgres (healthy) -> eureka-server (healthy) -> business services + gateway
#
# Docker addressing: services reach each other by SERVICE NAME on the compose
# network (postgres:5432, eureka-server:8761) — NOT localhost. These addresses are
# injected here as environment variables that OVERRIDE the dev-profile defaults
# (localhost), so local non-Docker development (profile dev, localhost:5433) keeps
# working unchanged.
#
# NOTE: this stack's postgres also uses host port 5433 — stop the standalone
# monolith DB (root docker-compose.yml: creatorhub-postgres) before starting this.

services:
  postgres:
    image: postgres:16
    container_name: creatorhub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: creatorhub
      POSTGRES_PASSWORD: creatorhub
      POSTGRES_DB: creatorhub
    ports:
      - "5433:5432"            # host:container — external inspection only; services use postgres:5432
    volumes:
      - creatorhub-stack-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creatorhub -d creatorhub"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: creatorhub-mongo
    restart: unless-stopped
    ports:
      - "27018:27017"          # host 27018 (a native mongod may hold 27017); services use mongodb:27017
    volumes:
      - creatorhub-stack-mongodata:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  eureka-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: eureka-server
    image: creatorhub/eureka-server:0.0.1
    container_name: creatorhub-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"            # Eureka dashboard on the host
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: config-server
    image: creatorhub/config-server:0.0.1
    container_name: creatorhub-config
    restart: unless-stopped
    ports:
      - "8888:8888"            # Config Server on the host (demo: /<service>/default)
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: user-service
    image: creatorhub/user-service:0.0.1
    container_name: creatorhub-user
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/creatorhub
      SPRING_DATASOURCE_USERNAME: creatorhub
      SPRING_DATASOURCE_PASSWORD: creatorhub
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      CONFIG_SERVER_URL: http://config-server:8888
      # JWT signing secret (HS256). MUST match the gateway's value below — the gateway
      # validates the tokens this service signs (symmetric key). DEV value, externalized.
      CREATORHUB_JWT_SECRET: creatorhub-docker-shared-jwt-secret-user-and-gateway-0123456789
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8092/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  subscription-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: subscription-service
    image: creatorhub/subscription-service:0.0.1
    container_name: creatorhub-subscription
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/creatorhub
      SPRING_DATASOURCE_USERNAME: creatorhub
      SPRING_DATASOURCE_PASSWORD: creatorhub
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8093/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  content-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: content-service
    image: creatorhub/content-service:0.0.1
    # No fixed container_name and no host port mapping -> this service can be scaled
    # to N instances: `docker compose up -d --scale content-service=2`. Docker
    # auto-names the replicas (…-content-service-1/-2); each registers in Eureka and
    # the gateway load-balances across them (lb://content-service).
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/creatorhub
      SPRING_DATASOURCE_USERNAME: creatorhub
      SPRING_DATASOURCE_PASSWORD: creatorhub
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8094/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: notification-service
    image: creatorhub/notification-service:0.0.1
    container_name: creatorhub-notification
    restart: unless-stopped
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/notifications_db
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      mongodb:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8095/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: api-gateway
    image: creatorhub/api-gateway:0.0.1
    container_name: creatorhub-gateway
    restart: unless-stopped
    ports:
      - "8085:8085"            # single entry point on the host
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      CONFIG_SERVER_URL: http://config-server:8888
      # JWT validation secret (HS256). MUST be identical to user-service's value above
      # (symmetric key): the gateway validates the tokens the User Service signs.
      CREATORHUB_JWT_SECRET: creatorhub-docker-shared-jwt-secret-user-and-gateway-0123456789
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8085/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # --- Monitoring ---
  prometheus:
    image: prom/prometheus:latest
    container_name: creatorhub-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - creatorhub-stack-promdata:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - eureka-server
      - api-gateway
      - user-service
      - subscription-service
      - content-service
      - notification-service

  grafana:
    image: grafana/grafana:latest
    container_name: creatorhub-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - creatorhub-stack-grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  creatorhub-stack-pgdata:
  creatorhub-stack-mongodata:
  creatorhub-stack-promdata:
  creatorhub-stack-grafanadata:
