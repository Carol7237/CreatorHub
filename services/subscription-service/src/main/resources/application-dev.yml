# DEV profile — PostgreSQL container (docker compose up -d). Schema-per-service:
# the Subscription Service owns the "subs_svc" schema in the shared "creatorhub" DB.
spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/creatorhub
    username: creatorhub
    password: creatorhub
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        default_schema: subs_svc
        hbm2ddl:
          create_namespaces: true
