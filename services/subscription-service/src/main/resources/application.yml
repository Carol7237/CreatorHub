# Base / common configuration for the Subscription Service.
spring:
  application:
    name: subscription-service

  profiles:
    active: dev

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false

server:
  port: 8093   # 8092 user-service / 8085 gateway / 8761 eureka are taken.

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Monitoring: expose the Prometheus scrape endpoint and tag metrics by service.
# Resilience4j circuit-breaker metrics (resilience4j_circuitbreaker_*) are exported too.
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
