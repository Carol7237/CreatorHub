spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          # Explicit routes. lb:// = resolve the target through Eureka and
          # load-balance across its instances (Spring Cloud LoadBalancer).
          routes:
            # User / identity bounded context: auth, creators browsing, profiles, admin users.
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/auth/**,/api/creators/**,/api/profiles/**,/api/admin/**
            # Subscriptions bounded context: tiers + subscriptions.
            # (the internal /internal/** access endpoint is NOT routed here — it is
            #  reached service-to-service only.)
            - id: subscription-service
              uri: lb://subscription-service
              predicates:
                - Path=/api/tiers/**,/api/subscriptions/**
            # Content bounded context: posts (incl. /{id}/comments), comments, tags.
            - id: content-service
              uri: lb://content-service
              predicates:
                - Path=/api/posts/**,/api/comments/**,/api/tags/**
            # Notifications bounded context (the /internal/** create endpoint is NOT routed).
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**

server:
  port: 8085   # 8080 is taken by Oracle TNS listener (TNSLSNR) on this machine.

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
