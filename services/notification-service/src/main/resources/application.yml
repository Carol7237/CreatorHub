# Base / common configuration for the Notification Service (MongoDB-backed).
spring:
  application:
    name: notification-service

  profiles:
    active: dev

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false

server:
  port: 8095   # 8092 user / 8093 subscription / 8094 content / 8085 gateway / 8761 eureka taken.

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
