# Base / common configuration for the User Service. Environment-specific settings
# (datasource, ddl-auto, schema) live in application-dev.yml (PostgreSQL) and
# application-test.yml (H2). Default active profile is "dev".
spring:
  application:
    name: user-service

  # Centralized config: import from the Config Server at startup. `optional:` means
  # the service still starts (with local config) if the Config Server is unavailable.
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"

  profiles:
    active: dev

  jpa:
    # Keep transaction boundaries inside the service layer (no Open Session In View).
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # Pagination defaults for web-bound Pageable. The service layer also caps the
  # page size (PageableUtils.MAX_PAGE_SIZE) as defense in depth.
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false   # page numbers are 0-based

# JWT (HS256) — access-token authentication.
# Step 1: the User Service signs an access token at /api/auth/login. The SAME secret
# is validated by the gateway at Step 2 (symmetric key), so keep both sides in sync.
# The default below is DEV-ONLY (documented as such, like the remember-me key) — it is
# NOT a real secret. Externalize via the CREATORHUB_JWT_SECRET env var (or the Config
# Server) before any real deployment. HS256 requires >= 256 bits (32+ characters).
creatorhub:
  jwt:
    secret: ${CREATORHUB_JWT_SECRET:dev-only-creatorhub-jwt-signing-secret-change-me-please-0123456789}
    # 7200s = 2 hours; when it expires the user simply logs in again (no refresh token).
    access-token-validity-seconds: ${CREATORHUB_JWT_TTL_SECONDS:7200}

server:
  # 8092: 8080 (Oracle TNS) / 8081 (monolith) / 8085 (gateway) / 8761 (eureka) are taken.
  port: 8092

# Register with Eureka so the gateway can route here via lb://user-service.
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Monitoring: expose the Prometheus scrape endpoint and tag metrics by service.
# /actuator/** is NOT routed by the gateway -> reachable only inside the Docker network.
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
