# Base / common configuration for the User Service. Environment-specific settings
# (datasource, ddl-auto, schema) live in application-dev.yml (PostgreSQL) and
# application-test.yml (H2). Default active profile is "dev".
spring:
  application:
    name: user-service

  profiles:
    active: dev

  jpa:
    # Keep transaction boundaries inside the service layer (no Open Session In View).
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # Pagination defaults for web-bound Pageable. The service layer also caps the
  # page size (PageableUtils.MAX_PAGE_SIZE) as defense in depth.
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false   # page numbers are 0-based

server:
  # 8092: 8080 (Oracle TNS) / 8081 (monolith) / 8085 (gateway) / 8761 (eureka) are taken.
  port: 8092

# Register with Eureka so the gateway can route here via lb://user-service.
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Monitoring: expose the Prometheus scrape endpoint and tag metrics by service.
# /actuator/** is NOT routed by the gateway -> reachable only inside the Docker network.
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
